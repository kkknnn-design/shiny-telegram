<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫雷游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #2c3e50;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  .container {
    background: #bdbdbd; border: 3px solid #7b7b7b;
    padding: 12px; border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; padding: 6px 10px;
    background: #c0c0c0; border: 2px solid;
    border-color: #808080 #fff #fff #808080;
  }
  .counter {
    background: #000; color: #ff0000; font-family: 'Courier New', monospace;
    font-size: 28px; font-weight: bold; padding: 4px 8px;
    border: 2px solid; border-color: #808080 #fff #fff #808080;
    min-width: 60px; text-align: center; letter-spacing: 2px;
  }
  .face {
    width: 42px; height: 42px; font-size: 28px;
    background: #c0c0c0; border: 3px solid;
    border-color: #fff #808080 #808080 #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    user-select: none; line-height: 1;
  }
  .face:active { border-color: #808080 #fff #fff #808080; }
  .grid {
    display: grid; border: 3px solid;
    border-color: #808080 #fff #fff #808080;
  }
  .cell {
    width: 28px; height: 28px; font-size: 15px; font-weight: bold;
    background: #c0c0c0; border: 3px solid;
    border-color: #fff #808080 #808080 #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none;
  }
  .cell:active:not(.revealed):not(.flagged) {
    border: 1px solid #808080; background: #bdbdbd;
  }
  .cell.revealed {
    border: 1px solid #808080; background: #bdbdbd;
  }
  .cell.flagged { font-size: 16px; }
  .cell.mine-hit { background: #ff0000; border: 1px solid #808080; }
  .cell.mine-wrong { background: #ffcccc; }
  .n1 { color: #0000ff; } .n2 { color: #008000; }
  .n3 { color: #ff0000; } .n4 { color: #000080; }
  .n5 { color: #800000; } .n6 { color: #008080; }
  .n7 { color: #000000; } .n8 { color: #808080; }
  .difficulty-bar {
    display: flex; gap: 6px; margin-top: 8px;
  }
  .difficulty-bar button {
    flex: 1; padding: 6px; cursor: pointer;
    background: #c0c0c0; border: 2px solid;
    border-color: #fff #808080 #808080 #fff;
    font-size: 13px; font-weight: bold;
  }
  .difficulty-bar button:active { border-color: #808080 #fff #fff #808080; }
  .difficulty-bar button.active { border-color: #808080 #fff #fff #808080; background: #b0b0b0; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="counter" id="mineCounter">000</div>
    <div class="face" id="faceBtn" title="重新开始">🙂</div>
    <div class="counter" id="timer">000</div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="difficulty-bar">
    <button onclick="setDifficulty(9,9,10)" class="active">初级</button>
    <button onclick="setDifficulty(16,16,40)">中级</button>
    <button onclick="setDifficulty(30,16,99)">高级</button>
  </div>
</div>

<script>
let rows = 9, cols = 9, totalMines = 10;
let board = [], revealed = [], flagged = [];
let gameOver = false, gameWon = false, firstClick = true;
let timerInterval = null, timerCount = 0;
let minesRemaining = totalMines;
let cellsLeft = rows * cols;

const gridEl = document.getElementById('grid');
const mineCounterEl = document.getElementById('mineCounter');
const timerEl = document.getElementById('timer');
const faceBtn = document.getElementById('faceBtn');

function init() {
  gameOver = false; gameWon = false; firstClick = true;
  clearInterval(timerInterval); timerInterval = null; timerCount = 0;
  minesRemaining = totalMines; cellsLeft = rows * cols;
  faceBtn.textContent = '🙂';
  updateMineCounter(); updateTimer();
  board = Array.from({length: rows}, () => Array(cols).fill(0));
  revealed = Array.from({length: rows}, () => Array(cols).fill(false));
  flagged = Array.from({length: rows}, () => Array(cols).fill(false));
  renderGrid();
}

function placeMines(excludeR, excludeC) {
  const candidates = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (!(r === excludeR && c === excludeC))
        candidates.push({r, c});
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }
  for (let i = 0; i < totalMines; i++) {
    const {r, c} = candidates[i];
    board[r][c] = -1;
    forEachNeighbor(r, c, (nr, nc) => {
      if (board[nr][nc] !== -1) board[nr][nc]++;
    });
  }
}

function forEachNeighbor(r, c, fn) {
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) fn(nr, nc);
    }
}

function renderGrid() {
  gridEl.style.gridTemplateColumns = `repeat(${cols}, 28px)`;
  gridEl.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = r; cell.dataset.col = c;
      cell.addEventListener('click', () => onLeftClick(r, c));
      cell.addEventListener('contextmenu', (e) => { e.preventDefault(); onRightClick(r, c); });
      updateCellAppearance(cell, r, c);
      gridEl.appendChild(cell);
    }
  }
}

function getCell(r, c) {
  return gridEl.children[r * cols + c];
}

function updateCellAppearance(cell, r, c) {
  cell.className = 'cell';
  if (revealed[r][c]) {
    cell.classList.add('revealed');
    if (board[r][c] === -1) {
      cell.classList.add('mine-hit');
      cell.textContent = '💣';
    } else if (board[r][c] > 0) {
      cell.classList.add('n' + board[r][c]);
      cell.textContent = board[r][c];
    }
  } else if (flagged[r][c]) {
    cell.classList.add('flagged');
    cell.textContent = '🚩';
  } else {
    cell.textContent = '';
  }
}

function updateAllCells() {
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      updateCellAppearance(getCell(r, c), r, c);
}

function onLeftClick(r, c) {
  if (gameOver || gameWon) return;
  if (flagged[r][c] || revealed[r][c]) return;
  if (firstClick) {
    placeMines(r, c);
    firstClick = false;
    startTimer();
  }
  reveal(r, c);
  checkWin();
  updateAllCells();
}

function reveal(r, c) {
  if (r < 0 || r >= rows || c < 0 || c >= cols) return;
  if (revealed[r][c] || flagged[r][c]) return;
  revealed[r][c] = true;
  cellsLeft--;
  if (board[r][c] === -1) {
    endGame(false, r, c);
    return;
  }
  if (board[r][c] === 0) {
    forEachNeighbor(r, c, (nr, nc) => reveal(nr, nc));
  }
}

function onRightClick(r, c) {
  if (gameOver || gameWon) return;
  if (revealed[r][c]) return;
  if (firstClick) return;
  flagged[r][c] = !flagged[r][c];
  minesRemaining += flagged[r][c] ? -1 : 1;
  updateMineCounter();
  updateCellAppearance(getCell(r, c), r, c);
}

function checkWin() {
  if (cellsLeft === totalMines) {
    gameWon = true;
    clearInterval(timerInterval);
    faceBtn.textContent = '😎';
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (board[r][c] === -1 && !flagged[r][c])
          flagged[r][c] = true;
    minesRemaining = 0;
    updateMineCounter();
    updateAllCells();
  }
}

function endGame(hit, hitR, hitC) {
  gameOver = true;
  clearInterval(timerInterval);
  faceBtn.textContent = hit ? '😵' : '😎';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (board[r][c] === -1) {
        revealed[r][c] = true;
        const cell = getCell(r, c);
        if (r === hitR && c === hitC) {
          cell.classList.add('mine-hit');
        }
      } else if (flagged[r][c] && board[r][c] !== -1) {
        revealed[r][c] = true;
        const cell = getCell(r, c);
        cell.classList.add('mine-wrong');
        cell.textContent = '❌';
      }
    }
  }
  updateAllCells();
}

function startTimer() {
  timerInterval = setInterval(() => { timerCount++; updateTimer(); }, 1000);
}

function updateMineCounter() {
  mineCounterEl.textContent = String(Math.max(-99, Math.min(999, minesRemaining))).padStart(3, '0');
}

function updateTimer() {
  timerEl.textContent = String(Math.min(999, timerCount)).padStart(3, '0');
}

function setDifficulty(r, c, m) {
  rows = r; cols = c; totalMines = m;
  document.querySelectorAll('.difficulty-bar button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  init();
}

faceBtn.addEventListener('click', init);
init();
</script>
</body>
</html>
